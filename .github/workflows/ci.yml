name: CI

on:
  push:
    branches: [main]
  pull_request:

# The Tauri shell (src-tauri) needs system webview deps to build, so CI scopes
# Rust jobs to the engine + cli crates — the logic that has tests. The desktop
# app is verified locally (see README platform table).

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p agentpipe-engine -p agentpipe-cli --verbose

  rust-windows-build:
    name: rust build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build-check only: confirms the cfg(unix)-gated process-group code and its
      # non-unix fallbacks compile on Windows. Runtime is untested (see README).
      - run: cargo build -p agentpipe-engine -p agentpipe-cli

  ui:
    name: ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
