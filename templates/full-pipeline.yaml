version: 1
name: "<任务名>"
target: <目标仓库绝对路径>
mode: step
steps:
  - id: brainstorm
    kind: human
    instruction: "在 Claude Code 跑 brainstorming,产出设计 spec"
    expects: artifact
  - id: design-review-claude
    kind: claude
    skill: four-dimension-review
    prompt: "审查设计文档 {{brainstorm.artifact}}"
  - id: design-review-codex
    kind: codex
    action: review-doc
    path: "{{brainstorm.artifact}}"
  - id: plan
    kind: human
    instruction: "在 Claude Code 跑 writing-plans"
    expects: artifact
  - id: implement
    kind: claude
    allow_writes: true
    prompt: "按 {{plan.artifact}} 实现,提交,建 MR,最后只输出 MR URL"
  - id: self-review
    kind: human
    instruction: "code-review + simplify,提交到 MR"
  - id: codex-loop
    kind: loop
    until: codex-clean
    max: 5
    body:
      - id: codex-review-mr
        kind: codex
        action: review-mr
        base: dev
      - id: apply-feedback
        kind: claude
        allow_writes: true
        prompt: "按 Codex 反馈修改并提交:{{codex-review-mr.findings}}"
