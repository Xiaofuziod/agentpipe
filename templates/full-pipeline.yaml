version: 1
name: "<任务名>"
target: <目标仓库绝对路径>
mode: auto
steps:
  - id: brainstorm
    kind: claude
    skill: brainstorming
    prompt: "对这个任务做 brainstorming 产出设计方案,所有设计决策默认采用你的推荐选项无需等我确认,把方案写成设计文档落到 docs/specs/,最后只输出该文档路径"
  - id: design-review-claude
    kind: claude
    skill: four-dimension-review
    prompt: "审查设计文档 {{brainstorm.artifact}}"
  - id: design-review-codex
    kind: codex
    action: review-doc
    path: "{{brainstorm.artifact}}"
  - id: plan
    kind: claude
    skill: writing-plans
    prompt: "依据设计文档 {{brainstorm.artifact}} 产出执行文档(分步实施计划),落到 docs/plans/,最后只输出该文档路径"
  - id: implement
    kind: claude
    prompt: "按执行文档 {{plan.artifact}} 实现,提交代码,创建 MR,最后只输出 MR URL"
  - id: self-review
    kind: claude
    prompt: "对刚才的改动先跑 /code-review 修复发现的问题,再跑 /simplify 优化,然后提交到 MR"
  # 动态解析刚刚 implement 创建的 MR 的目标分支(base);避免写死 dev / main 与项目
  # 实际默认分支不一致(见 mr-review-loop 同形 base step 设计)。
  - id: base
    kind: claude
    prompt: "执行 `gh pr view {{implement.artifact}} --json baseRefName -q .baseRefName` 解析 MR {{implement.artifact}} 的 base 分支。失败时回退 `git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@'`。**只输出 base 分支名,不要 markdown / 代码块 / 多余文字**。"
  - id: codex-loop
    kind: loop
    until: codex-clean
    max: 5
    body:
      - id: codex-review-mr
        kind: codex
        action: review-mr
        base: "{{base.artifact}}"  # 由上方 base step 从 MR 元信息动态解析
      - id: apply-feedback
        kind: claude
        prompt: "按 Codex 反馈修改并提交:{{codex-review-mr.findings}}"
  - id: memorize
    kind: claude
    prompt: "总结本轮任务需要被记录的点(踩坑/约定/关键设计决策),按记忆规范存入记忆并更新记忆索引"
